name: Build Check

# Vercel auto-deploys on push to main (connected via Vercel dashboard).
# This workflow just validates the build succeeds before Vercel picks it up.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_SUPERADMIN_API_URL: https://placeholder.cloudfront.net
        run: npm run build
